<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ReviewArena</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    /* Navigation */
    .nav {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
    }

    .nav button {
      padding: 10px 30px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background: #007bff;
      color: white;
    }

    .nav button:hover { background: #0056b3; }

    /* Pages */
    .page { display: none; }
    .page.active { display: block; }

    /* Comparison page */
    .reviews {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }

    .review-box {
      flex: 1;
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .review-box h2 {
      margin-bottom: 10px;
      color: #555;
    }

    .model-label {
      margin-top: 15px;
      font-weight: bold;
      color: #007bff;
      display: none;  
    }

    /* Vote buttons */
    .vote-buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 20px;
    }

    .vote-buttons button {
      padding: 12px 25px;
      font-size: 15px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      color: white;
    }

    #btn-a { background: #28a745; }
    #btn-tie { background: #ffc107; color: #333; }
    #btn-b { background: #dc3545; }

    .vote-buttons button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #next-btn {
      display: block;
      margin: 0 auto;
      padding: 10px 30px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
      display: none;
    }

    /* Leaderboard page */
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    th, td {
      padding: 15px 20px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }

    th { background: #007bff; color: white; }
    tr:hover { background: #f9f9f9; }
  </style>
</head>
<body>

  <h1> ReviewArena</h1>

  <!-- Navigation -->
  <div class="nav">
    <button onclick="showPage('comparison')">Compare</button>
    <button onclick="showPage('leaderboard')">Leaderboard</button>
  </div>

  <!-- PAGE 1: Comparison -->
  <div id="comparison" class="page active">
    <div class="reviews">
      <div class="review-box">
        <h2>Review A</h2>
        <p id="review-a-text">Loading...</p>
        <div class="model-label" id="model-a-label"></div>
      </div>
      <div class="review-box">
        <h2>Review B</h2>
        <p id="review-b-text">Loading...</p>
        <div class="model-label" id="model-b-label"></div>
      </div>
    </div>

    <div class="vote-buttons">
      <button id="btn-a" onclick="vote('A')">✅ A is Better</button>
      <button id="btn-tie" onclick="vote('tie')">🤝 Tie</button>
      <button id="btn-b" onclick="vote('B')">✅ B is Better</button>
    </div>

    <button id="next-btn" onclick="loadComparison()">🔄 Next Comparison</button>
  </div>

  <!-- PAGE 2: Leaderboard -->
  <div id="leaderboard" class="page">
    <table>
      <thead>
        <tr>
          <th>Rank</th>
          <th>Model</th>
          <th>Votes</th>
        </tr>
      </thead>
      <tbody id="leaderboard-body">
        <tr><td colspan="3">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    const API = "http://localhost:8000";
    let currentComparisonId = null;

    // ── Show/hide pages ──
    function showPage(page) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(page).classList.add('active');
      if (page === 'leaderboard') loadLeaderboard();
    }

    // ── Load a random comparison ──
    async function loadComparison() {
      // Reset UI
      document.getElementById('review-a-text').textContent = "Loading...";
      document.getElementById('review-b-text').textContent = "Loading...";
      document.getElementById('model-a-label').style.display = "none";
      document.getElementById('model-b-label').style.display = "none";
      document.getElementById('next-btn').style.display = "none";

      // Enable buttons
      ['btn-a', 'btn-tie', 'btn-b'].forEach(id => {
        document.getElementById(id).disabled = false;
      });

      const res = await fetch(`${API}/comparison`);
      const data = await res.json();

      currentComparisonId = data.comparison_id;
      document.getElementById('review-a-text').textContent = data.review_a;
      document.getElementById('review-b-text').textContent = data.review_b;
    }

    // ── Vote ──
    async function vote(winner) {
      // Disable buttons immediately
      ['btn-a', 'btn-tie', 'btn-b'].forEach(id => {
        document.getElementById(id).disabled = true;
      });

      const res = await fetch(`${API}/vote`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ comparison_id: currentComparisonId, winner })
      });

      const data = await res.json();

      // Reveal model names
      const modelALabel = document.getElementById('model-a-label');
      const modelBLabel = document.getElementById('model-b-label');
      modelALabel.textContent = `Model: ${data.model_a}`;
      modelBLabel.textContent = `Model: ${data.model_b}`;
      modelALabel.style.display = "block";
      modelBLabel.style.display = "block";

      // Show next button
      document.getElementById('next-btn').style.display = "block";
    }

    // ── Load leaderboard ──
    async function loadLeaderboard() {
      const res = await fetch(`${API}/leaderboard`);
      const data = await res.json();

      const tbody = document.getElementById('leaderboard-body');
      tbody.innerHTML = data.map((entry, index) => `
        <tr>
          <td>${index + 1}</td>
          <td>${entry.model}</td>
          <td>${entry.votes}</td>
        </tr>
      `).join('');
    }

    // Load first comparison on startup
    loadComparison();
  </script>

</body>
</html>
